modules:
  - name: Install ReadySet
    type: repos
    body:
      custom:
        - rpm https://altlinux.space/api/packages/alt-gnome/alt/group/ready-set-nightly/${{ Env.PKG_GROUP }}/sisyphus.repo _arch_ classic

  - type: packages
    body:
      install:
        - ready-set-gdm
        - ready-set-plugin-language
        - ready-set-plugin-keyboard
        - ready-set-plugin-user-passwdqc
        - ready-set-plugin-tests

  - name: Copy configuration
    type: copy
    body:
      source: root
      destination: /
      replace: true

  - type: shell
    body:
      command: |
        touch /var/ready-set-log
        chmod 777 /var/ready-set-log

  - name: Update dconf
    type: shell
    body:
      command: dconf update
