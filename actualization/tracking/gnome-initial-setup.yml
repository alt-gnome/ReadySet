repo: https://gitlab.gnome.org/GNOME/gnome-initial-setup.git
deps:
- meson
- gcc
- gettext-devel
- pkgconfig(libadwaita-1)
- pkgconfig(ibus-1.0)
- pkgconfig(malcontent-0)
- pkgconfig(malcontent-ui-1)
- pkgconfig(webkitgtk-6.0)
- pkgconfig(libnm)
- pkgconfig(libnma-gtk4)
- pkgconfig(polkit-gobject-1)
- pkgconfig(accountsservice)
- pkgconfig(gnome-desktop-4)
- pkgconfig(geocode-glib-2.0)
- pkgconfig(gweather4)
- pkgconfig(systemd)
- pkgconfig(gsettings-desktop-schemas)
- pkgconfig(fontconfig)
- pkgconfig(gdm)
- pkgconfig(libgeoclue-2.0)
- pkgconfig(pango)
- pkgconfig(json-glib-1.0)
- pkgconfig(krb5)
- pkgconfig(libsecret-1)
- pkgconfig(pwquality)
run: |
  meson setup _build --prefix=/usr
  DESTDIR=out meson install -C _build
  find . -mindepth 1 -maxdepth 1 ! -name '_build' -exec rm -rf {} +
  cp -a _build/out/. .
  rm -rf _build
exclude:
- usr/share/locale
- usr/share/applications/gnome-initial-setup.desktop
